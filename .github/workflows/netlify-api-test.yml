name: Simple Comment

on:
  pull_request:
    branches: [master]

jobs:
  test-netlify-functions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: |
          npm install yarn@^1 --no-package-lock -g
          yarn --frozen-lockfile --production=false --ignore-optional

      - name: Lint
        run: yarn run lint

      - name: Format
        run: yarn run prettier --list-different .

      - name: Build Netlify functions
        run: yarn run build:netlify

      - name: Test Netlify functions
        env:
          # ubuntu-latest no longer provides OpenSSL 1.1; force a distro/binary combo
          # that links against OpenSSL 3 for mongodb-memory-server.
          MONGOMS_DISTRO: ubuntu-22.04
        run: |
          node ./scripts/createTestEnv.mjs 
          yarn test
