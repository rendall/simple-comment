<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Options Target Host</title>
    <link
      rel="stylesheet"
      type="text/css"
      href="/css/simple-comment-style.css"
    />
  </head>
  <body>
    <div id="simple-comment"></div>
    <div id="custom-target"></div>
    <script type="module" src="/js/simple-comment.js"></script>
    <script type="module">
      window.setSimpleCommentOptions({
        discussionId: "options-target-discussion",
        target: document.getElementById("custom-target"),
        title: "Custom Target Title",
      })
    </script>
  </body>
</html>
